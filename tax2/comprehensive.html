<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>종합부동산세 계산기</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%);
      font-family: 'Noto Sans KR', sans-serif;
      padding: 2rem 1rem 4rem;
      color: #e8f4f8;
    }

    .card {
      max-width: 720px;
      margin: 0 auto;
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 24px;
      border: 1px solid rgba(255,255,255,0.12);
      overflow: hidden;
    }

    .card-header {
      padding: 2rem 2rem 1.5rem;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      background: linear-gradient(135deg, rgba(0,180,219,0.15), rgba(0,131,176,0.1));
    }
    .card-header h1 { font-size: 1.7rem; font-weight: 800; letter-spacing: -0.02em; color: #fff; }
    .card-header p  { font-size: 0.85rem; color: rgba(255,255,255,0.5); margin-top: 6px; }

    .card-body { padding: 1.8rem 2rem; }

    .section-label {
      font-size: 0.72rem; font-weight: 700; letter-spacing: 0.1em;
      text-transform: uppercase; color: rgba(100,200,255,0.7);
      margin-bottom: 10px; margin-top: 22px;
    }
    .section-label:first-child { margin-top: 0; }

    .radio-group { display: flex; gap: 10px; margin-bottom: 4px; }
    .radio-btn {
      flex: 1; padding: 10px 0; border-radius: 10px;
      border: 1.5px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.04); color: rgba(255,255,255,0.6);
      font-weight: 400; font-size: 0.9rem; cursor: pointer; transition: all 0.2s;
      text-align: center; font-family: 'Noto Sans KR', sans-serif; line-height: 1.5;
    }
    .radio-btn.active { border-color: #00b4db; background: rgba(0,180,219,0.18); color: #00d4ff; font-weight: 700; }
    .radio-btn small  { display: block; font-size: 0.75rem; opacity: 0.7; font-weight: 400; }

    .house-list { display: flex; flex-direction: column; gap: 8px; }
    .house-row  { display: flex; gap: 8px; align-items: center; }

    .input-wrap { flex: 1; position: relative; }
    .input-wrap input {
      width: 100%; padding: 11px 48px 11px 14px; border-radius: 10px;
      border: 1.5px solid rgba(255,255,255,0.12); background: rgba(255,255,255,0.06);
      color: #fff; font-size: 0.95rem; outline: none;
      font-family: 'Noto Sans KR', sans-serif; transition: border-color 0.2s;
    }
    .input-wrap input:focus { border-color: rgba(0,180,219,0.5); }
    .input-wrap input::placeholder { color: rgba(255,255,255,0.25); }
    .input-suffix {
      position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
      color: rgba(255,255,255,0.4); font-size: 0.8rem; pointer-events: none;
    }

    .remove-btn {
      padding: 9px 13px; border-radius: 8px; border: 1px solid rgba(255,80,80,0.4);
      background: rgba(255,80,80,0.1); color: #ff8080; cursor: pointer; font-size: 1rem;
      transition: background 0.2s; font-family: 'Noto Sans KR', sans-serif;
    }
    .remove-btn:hover { background: rgba(255,80,80,0.2); }

    .add-btn {
      width: 100%; padding: 10px; margin-top: 8px; border-radius: 10px;
      border: 1.5px dashed rgba(255,255,255,0.2); background: transparent;
      color: rgba(255,255,255,0.5); cursor: pointer; font-size: 0.9rem;
      transition: all 0.2s; font-family: 'Noto Sans KR', sans-serif;
    }
    .add-btn:hover { border-color: rgba(0,180,219,0.4); color: rgba(0,212,255,0.7); }

    .calc-btn {
      width: 100%; padding: 14px; margin-top: 24px; border-radius: 12px; border: none;
      background: linear-gradient(135deg, #00b4db, #0083b0); color: #fff;
      font-weight: 800; font-size: 1.05rem; cursor: pointer; letter-spacing: 0.03em;
      box-shadow: 0 4px 20px rgba(0,180,219,0.3); transition: transform 0.15s, box-shadow 0.15s;
      font-family: 'Noto Sans KR', sans-serif;
    }
    .calc-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 28px rgba(0,180,219,0.45); }
    .calc-btn:active { transform: translateY(0); }

    /* ── 결과 카드 ── */
    .result-card {
      margin-top: 28px; border-radius: 16px; border: 1px solid rgba(0,180,219,0.3);
      overflow: hidden; background: rgba(0,180,219,0.06); animation: fadeIn 0.35s ease;
    }
    @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }

    .result-header {
      padding: 13px 20px; background: rgba(0,180,219,0.12);
      font-size: 0.78rem; font-weight: 700; letter-spacing: 0.08em;
      color: #00d4ff; text-transform: uppercase;
    }
    .result-rows { padding: 6px 0; }
    .result-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 9px 20px; font-size: 0.875rem;
    }
    .result-label { color: rgba(255,255,255,0.6); }
    .result-value { font-weight: 600; color: #e8f4f8; }
    .result-divider { height: 1px; background: rgba(255,255,255,0.07); margin: 3px 0; }

    .badge {
      display: inline-block; padding: 2px 8px; border-radius: 6px;
      font-size: 0.72rem; font-weight: 700; margin-left: 8px; vertical-align: middle;
    }
    .badge-normal { background: rgba(0,220,130,0.15); color: #00dc82; }
    .badge-heavy  { background: rgba(255,100,100,0.15); color: #ff8080; }

    .total-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 14px 20px; background: rgba(0,180,219,0.1);
      border-top: 1px solid rgba(0,180,219,0.25);
    }
    .total-label { font-weight: 700; font-size: 1rem; color: #00d4ff; }
    .total-value { font-weight: 800; font-size: 1.2rem; color: #fff; }

    .msg-box { padding: 16px 20px; color: rgba(255,255,255,0.6); font-size: 0.9rem; line-height: 1.7; }

    /* ── 계산 과정 토글 버튼 ── */
    .process-toggle {
      width: 100%; padding: 12px 20px; border: none;
      background: rgba(255,255,255,0.03); color: rgba(255,255,255,0.45);
      cursor: pointer; font-size: 0.82rem; font-weight: 600;
      font-family: 'Noto Sans KR', sans-serif;
      display: flex; align-items: center; justify-content: center; gap: 7px;
      transition: background 0.2s, color 0.2s; letter-spacing: 0.02em;
      border-top: 1px solid rgba(255,255,255,0.07);
    }
    .process-toggle:hover { background: rgba(255,255,255,0.07); color: rgba(255,255,255,0.7); }
    .process-toggle .arrow { transition: transform 0.3s; display: inline-block; font-size: 0.7rem; }
    .process-toggle.open   { color: #00d4ff; background: rgba(0,180,219,0.06); }
    .process-toggle.open .arrow { transform: rotate(180deg); }

    /* ── 계산 과정 본문 (아코디언) ── */
    .process-body {
      overflow: hidden; max-height: 0;
      transition: max-height 0.45s cubic-bezier(0.4,0,0.2,1);
      border-top: 1px solid rgba(255,255,255,0.06);
    }
    .process-body.open { max-height: 3000px; }
    .process-inner { padding: 18px 18px 22px; display: flex; flex-direction: column; gap: 12px; }

    /* ── 각 STEP 카드 ── */
    .step { border-radius: 11px; overflow: hidden; border: 1px solid rgba(255,255,255,0.08); }

    .step-title {
      padding: 8px 14px; font-size: 0.73rem; font-weight: 700;
      letter-spacing: 0.07em; text-transform: uppercase;
    }
    .step-title.blue   { background: rgba(0,180,219,0.16);  color: #5dd5f5; }
    .step-title.green  { background: rgba(0,200,130,0.13);  color: #4ee8a8; }
    .step-title.orange { background: rgba(255,160,50,0.13); color: #ffb860; }
    .step-title.purple { background: rgba(160,100,255,0.13);color: #c090ff; }
    .step-title.teal   { background: rgba(0,200,180,0.13);  color: #40e0d0; }
    .step-title.red    { background: rgba(255,80,80,0.11);  color: #ff9090; }

    .step-content {
      padding: 12px 14px 14px;
      font-size: 0.83rem; line-height: 1.85;
      color: rgba(255,255,255,0.7);
      background: rgba(0,0,0,0.18);
    }

    /* ── 수식 블록 ── */
    .formula {
      background: rgba(0,0,0,0.28); border-radius: 8px;
      padding: 11px 14px; margin: 10px 0 2px;
      font-size: 0.83rem; color: rgba(255,255,255,0.55); line-height: 2;
      border-left: 3px solid rgba(0,180,219,0.45);
    }
    .formula .hi  { color: #e8f4f8; font-weight: 700; }
    .formula .ans { color: #00d4ff; font-weight: 800; font-size: 0.92rem; }
    .formula .sub { color: rgba(255,255,255,0.35); font-size: 0.77rem; }
    .formula .note { 
      display: inline-block; margin-top: 4px; padding: 2px 8px;
      border-radius: 5px; background: rgba(0,180,219,0.1); 
      color: rgba(0,212,255,0.7); font-size: 0.75rem; 
    }

    /* ── 재산세 테이블 ── */
    .sub-table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.79rem; }
    .sub-table th {
      padding: 6px 10px; text-align: left; color: rgba(255,255,255,0.38);
      font-weight: 600; border-bottom: 1px solid rgba(255,255,255,0.08); font-size: 0.73rem;
    }
    .sub-table td       { padding: 7px 10px; border-bottom: 1px solid rgba(255,255,255,0.05); color: rgba(255,255,255,0.68); }
    .sub-table tr:last-child td { border-bottom: none; }
    .td-right { text-align: right; font-weight: 600; color: #e8f4f8; }
    .td-sum   { color: #00d4ff !important; font-weight: 700 !important; }

    .notice {
      margin-top: 20px; padding: 12px 16px; border-radius: 10px;
      background: rgba(255,200,0,0.07); border: 1px solid rgba(255,200,0,0.15);
      font-size: 0.78rem; color: rgba(255,255,255,0.45); line-height: 1.7;
    }

    /* ── 하단 액션 버튼 ── */
    .action-bar {
      display: flex; gap: 10px; margin-top: 20px;
    }
    .action-btn {
      flex: 1; padding: 13px 0; border-radius: 12px; border: none;
      font-size: 0.9rem; font-weight: 700; cursor: pointer;
      font-family: 'Noto Sans KR', sans-serif;
      display: flex; align-items: center; justify-content: center; gap: 6px;
      transition: transform 0.15s, opacity 0.15s;
    }
    .action-btn:hover  { transform: translateY(-1px); opacity: 0.9; }
    .action-btn:active { transform: translateY(0); }

    .btn-print {
      background: linear-gradient(135deg, #00b4db, #0083b0);
      color: #fff; box-shadow: 0 4px 16px rgba(0,180,219,0.25);
    }
    .btn-save {
      background: linear-gradient(135deg, #11998e, #38ef7d);
      color: #fff; box-shadow: 0 4px 16px rgba(56,239,125,0.2);
    }
    .btn-reset {
      background: rgba(255,255,255,0.07);
      border: 1.5px solid rgba(255,255,255,0.15) !important;
      color: rgba(255,255,255,0.55);
    }
    .btn-reset:hover { background: rgba(255,80,80,0.12); border-color: rgba(255,80,80,0.3) !important; color: #ff8080; }

    /* ── 인쇄 스타일 ── */
    @media print {
      @page { size: A4; margin: 12mm 14mm; }

      * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }

      body {
        background: #fff !important;
        color: #1a1a2e !important;
        padding: 0 !important;
        font-size: 11px !important;
      }

      .card {
        max-width: 100% !important;
        background: #fff !important;
        border: none !important;
        border-radius: 0 !important;
        backdrop-filter: none !important;
        box-shadow: none !important;
      }

      .card-header {
        background: #1a3a5c !important;
        padding: 10px 16px !important;
        border-bottom: 2px solid #0083b0 !important;
        border-radius: 0 !important;
      }
      .card-header h1 { color: #fff !important; font-size: 16px !important; }
      .card-header p  { color: rgba(255,255,255,0.7) !important; font-size: 10px !important; }

      .card-body { padding: 10px 16px !important; }

      /* 입력 섹션 숨기기 */
      .section-label, .radio-group, .house-list,
      .add-btn, .calc-btn, .notice, .action-bar { display: none !important; }

      /* 직전연도 입력 숨기기 (label도) */
      .card-body > .section-label,
      .card-body > .input-wrap { display: none !important; }

      /* 결과카드 */
      .result-card {
        margin-top: 0 !important;
        border: 1.5px solid #0083b0 !important;
        border-radius: 8px !important;
        animation: none !important;
        background: #f8fbff !important;
      }

      .result-header {
        background: #0083b0 !important;
        color: #fff !important;
        padding: 7px 14px !important;
        font-size: 9px !important;
      }

      .result-row { padding: 5px 14px !important; font-size: 11px !important; }
      .result-label { color: #444 !important; }
      .result-value { color: #1a1a2e !important; }
      .result-divider { background: #dde !important; }

      .badge-normal { background: #e0fff0 !important; color: #007a45 !important; }
      .badge-heavy  { background: #fff0f0 !important; color: #c0392b !important; }

      .total-row {
        background: #e8f4fb !important;
        border-top: 1.5px solid #0083b0 !important;
        padding: 9px 14px !important;
      }
      .total-label { color: #0083b0 !important; font-size: 12px !important; }
      .total-value { color: #1a1a2e !important; font-size: 14px !important; }

      /* 계산 과정 펼쳐서 인쇄 */
      .process-toggle { display: none !important; }
      .process-body   { max-height: none !important; overflow: visible !important; border-top: 1.5px solid #dde !important; }
      .process-inner  { padding: 8px 10px 10px !important; gap: 7px !important; }

      .step { border: 1px solid #ccd !important; border-radius: 6px !important; break-inside: avoid; }

      .step-title { padding: 5px 10px !important; font-size: 8px !important; }
      .step-title.blue   { background: #d6eef8 !important; color: #0069a0 !important; }
      .step-title.green  { background: #d6f5e8 !important; color: #006644 !important; }
      .step-title.orange { background: #fdf0d8 !important; color: #8a5500 !important; }
      .step-title.purple { background: #ede8fc !important; color: #5b21b6 !important; }
      .step-title.teal   { background: #d6f5f2 !important; color: #005f57 !important; }
      .step-title.red    { background: #fde8e8 !important; color: #9b1c1c !important; }

      .step-content {
        background: #fff !important; padding: 7px 10px 8px !important;
        font-size: 10px !important; color: #333 !important; line-height: 1.6 !important;
      }

      .formula {
        background: #f4f6fa !important; border-left: 3px solid #0083b0 !important;
        padding: 6px 10px !important; margin: 5px 0 0 !important;
        font-size: 10px !important; color: #555 !important; line-height: 1.7 !important;
        border-radius: 4px !important;
      }
      .formula .hi  { color: #1a1a2e !important; }
      .formula .ans { color: #0069a0 !important; }
      .formula .sub { color: #888 !important; }
      .formula .note { background: #e0f0fb !important; color: #0069a0 !important; }

      .sub-table { font-size: 9px !important; }
      .sub-table th { color: #666 !important; border-bottom-color: #ccd !important; }
      .sub-table td { color: #333 !important; border-bottom-color: #eef !important; }
      .td-right { color: #1a1a2e !important; }
      .td-sum   { color: #0069a0 !important; }

      /* 인쇄 푸터 */
      .print-footer {
        display: block !important;
        margin-top: 8px; font-size: 8px; color: #aaa;
        text-align: right; border-top: 1px solid #eee; padding-top: 4px;
      }
    }

    /* 화면에서 인쇄 푸터 숨기기 */
    .print-footer { display: none; }

    @media (max-width: 480px) {
      .card-body   { padding: 1.4rem 1.2rem; }
      .card-header { padding: 1.4rem 1.2rem 1.2rem; }
      .card-header h1 { font-size: 1.35rem; }
      .process-inner  { padding: 14px 12px 16px; }
      .sub-table { font-size: 0.72rem; }
      .action-bar { flex-wrap: wrap; }
      .action-btn { font-size: 0.82rem; padding: 12px 0; }
    }
  </style>
</head>
<body>

<div class="card">
  <div class="card-header">
    <h1>🏠 종합부동산세 계산기</h1>
    <p>2023년 개정 기준 · 주택분 종합부동산세</p>
  </div>

  <div class="card-body">

    <div class="section-label">보유 유형</div>
    <div class="radio-group">
      <button class="radio-btn active" id="btn-one" onclick="setHouseType('1')">
        1세대 1주택자<small>공제 12억원</small>
      </button>
      <button class="radio-btn" id="btn-multi" onclick="setHouseType('0')">
        일반 / 다주택자<small>공제 9억원</small>
      </button>
    </div>

    <div class="section-label">주택별 공시가격 입력</div>
    <div class="house-list" id="house-list"></div>
    <button class="add-btn" onclick="addHouse()">+ 주택 추가</button>

    <div class="section-label">
      직전연도 재산세＋종합부동산세 합계
      <span style="opacity:0.5;font-weight:400;">(선택)</span>
    </div>
    <div class="input-wrap">
      <input type="text" inputmode="numeric" id="prev-year-tax"
        placeholder="세부담상한 계산용 (입력 시 150% 한도 적용)"
        oninput="this.value=toComma(this.value)" />
      <span class="input-suffix">원</span>
    </div>

    <button class="calc-btn" onclick="calculate()">계산하기</button>

    <div id="result-area"></div>

    <div class="notice">
      ⚠️ 본 계산기는 참고용이며, 세액공제(고령자·장기보유) 및 개별 감면은 반영되지 않습니다.
      정확한 세액은 국세청 홈택스의 종합부동산세 간이세액계산 서비스를 이용하세요.
    </div>

    <!-- 하단 액션 버튼 -->
    <div class="action-bar">
      <button class="action-btn btn-print" onclick="printResult()">🖨️ 인쇄하기</button>
      <button class="action-btn btn-save"  onclick="saveResult()">💾 저장하기</button>
      <button class="action-btn btn-reset" onclick="resetAll()">↺ 초기화</button>
    </div>

    <!-- 인쇄 시에만 보이는 푸터 -->
    <div class="print-footer" id="print-footer"></div>
  </div>
</div>

<script>
  const TAX_BRACKETS = [
    { max:300000000,  baseRate:0.005, baseDeduction:0,         heavyRate:0.005, heavyDeduction:0         },
    { max:600000000,  baseRate:0.007, baseDeduction:600000,    heavyRate:0.007, heavyDeduction:600000    },
    { max:1200000000, baseRate:0.010, baseDeduction:2400000,   heavyRate:0.010, heavyDeduction:2400000   },
    { max:2500000000, baseRate:0.013, baseDeduction:6000000,   heavyRate:0.020, heavyDeduction:14400000  },
    { max:5000000000, baseRate:0.015, baseDeduction:11000000,  heavyRate:0.030, heavyDeduction:39400000  },
    { max:9400000000, baseRate:0.020, baseDeduction:36000000,  heavyRate:0.040, heavyDeduction:89400000  },
    { max:Infinity,   baseRate:0.027, baseDeduction:101800000, heavyRate:0.050, heavyDeduction:183400000 },
  ];

  let houseType = '1', houseId = 1;
  let houses = [{ id: houseId++ }];

  const fmt  = n => (n===null||n===undefined) ? '-' : Math.round(n).toLocaleString('ko-KR')+'원';
  const pct  = r => (r*100).toFixed(1)+'%';

  function calcPropertyTax(p) {
    const b = p * 0.6;
    if (p <= 600000000)  return b * 0.001;
    if (p <= 1500000000) return b * 0.002 - 600000;
    return b * 0.004 - 3600000;
  }
  function propTaxRateLabel(p) {
    if (p <= 600000000)  return '0.1%';
    if (p <= 1500000000) return '0.2%';
    return '0.4%';
  }

  // ── 천단위 쉼표 포매팅 ────────────────────────────────────
  function toComma(str) {
    const digits = str.replace(/[^0-9]/g, '');
    if (!digits) return '';
    return parseInt(digits, 10).toLocaleString('ko-KR');
  }
  function fromComma(str) {
    return parseFloat(str.replace(/,/g, '')) || 0;
  }

  function handleCommaInput(el, id) {
    const raw = el.value;
    const cursor = el.selectionStart;
    const prevLen = raw.length;
    const formatted = toComma(raw);
    el.value = formatted;
    // 커서 위치 보정 (쉼표 삽입으로 늘어난 만큼 이동)
    const diff = formatted.length - prevLen;
    el.setSelectionRange(cursor + diff, cursor + diff);
    const h = houses.find(h => h.id === id);
    if (h) h.value = formatted;
  }

  function setHouseType(v) {
    houseType = v;
    document.getElementById('btn-one').classList.toggle('active', v==='1');
    document.getElementById('btn-multi').classList.toggle('active', v==='0');
  }

  function renderHouses() {
    const list = document.getElementById('house-list');
    list.innerHTML = '';
    houses.forEach((h, i) => {
      const row = document.createElement('div');
      row.className = 'house-row';
      row.innerHTML = `
        <div class="input-wrap">
          <input type="text" inputmode="numeric" id="house-${h.id}"
            placeholder="주택 ${i+1} 공시가격 (예: 800,000,000)"
            value="${h.value||''}" oninput="handleCommaInput(this,${h.id})" />
          <span class="input-suffix">원</span>
        </div>
        ${houses.length>1 ? `<button class="remove-btn" onclick="removeHouse(${h.id})">✕</button>` : ''}
      `;
      list.appendChild(row);
    });
  }

  function addHouse()      { houses.push({ id: houseId++ }); renderHouses(); }
  function removeHouse(id) { houses = houses.filter(h => h.id !== id); renderHouses(); }
  function updateHouseValue(id,val) { const h = houses.find(h=>h.id===id); if(h) h.value=val; }

  function toggleProcess(btn) {
    btn.classList.toggle('open');
    btn.nextElementSibling.classList.toggle('open');
  }

  function calculate() {
    // 최신 입력값 수집
    houses.forEach(h => {
      const el = document.getElementById('house-'+h.id);
      if (el) h.value = el.value;
    });

    const prices = houses.map(h => fromComma(h.value||'0'));
    const total  = prices.reduce((a,b)=>a+b, 0);
    const count  = houses.length;
    const isOne  = houseType === '1';
    const DEDUCTION = isOne ? 1200000000 : 900000000;
    const RATIO  = 0.60;

    const excessAmount = Math.max(0, total - DEDUCTION);
    const taxBase      = excessAmount * RATIO;
    const area         = document.getElementById('result-area');

    if (taxBase <= 0) {
      area.innerHTML = `
        <div class="result-card">
          <div class="result-header">계산 결과</div>
          <div class="msg-box">
            과세표준이 0 이하로 <strong style="color:#00dc82;">종합부동산세 납부 대상이 아닙니다.</strong><br>
            주택공시가격 합계 ${fmt(total)}, 공제금액 ${fmt(DEDUCTION)}
          </div>
        </div>`;
      return;
    }

    // 세율 결정
    const isHeavy    = count >= 3 && taxBase > 1200000000;
    const bracket    = TAX_BRACKETS.find(b => taxBase <= b.max);
    const rate       = isHeavy ? bracket.heavyRate : bracket.baseRate;
    const progDed    = isHeavy ? bracket.heavyDeduction : bracket.baseDeduction;
    const crtTax     = taxBase * rate - progDed;

    // 재산세 계산
    const propTaxList  = prices.map(p => calcPropertyTax(p));
    const propTaxTotal = propTaxList.reduce((s,t)=>s+t, 0);

    // 공제할 재산세액
    const denom = propTaxTotal; // 전체 주택 재산세 (분모)
    const deductiblePropTax = denom > 0
      ? propTaxTotal * (taxBase * RATIO * rate) / denom
      : 0;

    // 산출세액
    const computedTax = Math.max(0, crtTax - Math.min(deductiblePropTax, crtTax));

    // 세부담상한
    const prevVal  = fromComma(document.getElementById('prev-year-tax').value||'0');
    const taxLimit = prevVal > 0 ? prevVal * 1.5 : null;
    const finalTax = taxLimit !== null ? Math.min(computedTax, taxLimit) : computedTax;

    // 농어촌특별세
    const ruralTax    = finalTax * 0.20;
    const totalBurden = finalTax + ruralTax;

    const badgeHtml = `<span class="badge ${isHeavy?'badge-heavy':'badge-normal'}">${isHeavy?'중과세율':'기본세율'}</span>`;
    const limitRow  = taxLimit !== null
      ? `<div class="result-row"><span class="result-label">세부담상한액 (전년도×150%)</span><span class="result-value">${fmt(taxLimit)}</span></div>` : '';

    // ── 재산세 테이블 행
    const propRows = prices.map((p,i) => `
      <tr>
        <td>주택 ${i+1}</td>
        <td>${fmt(p)}</td>
        <td>${fmt(p*0.6)}</td>
        <td>${propTaxRateLabel(p)}</td>
        <td class="td-right">${fmt(propTaxList[i])}</td>
      </tr>`).join('');

    // ── 주택 목록 (STEP1 표시용)
    const priceList = prices.map((p,i)=>`주택${i+1} ${fmt(p)}`).join(' + ');

    // ── 세부담상한 STEP (선택)
    const stepLimit = taxLimit !== null ? `
      <div class="step">
        <div class="step-title teal">STEP 5 · 세부담상한 적용</div>
        <div class="step-content">
          직전 연도 보유세의 150%를 초과하는 세금은 부과되지 않습니다.
          <div class="formula">
            세부담상한액 = 전년도 세액 <span class="hi">${fmt(prevVal)}</span> × 150%
            = <span class="hi">${fmt(taxLimit)}</span><br>
            산출세액 <span class="hi">${fmt(computedTax)}</span>
            ${computedTax > taxLimit
              ? `&gt; 세부담상한액 → <span class="note">상한 적용</span>`
              : `≤ 세부담상한액 → <span class="note">상한 미적용</span>`}<br>
            납부세액 = <span class="ans">${fmt(finalTax)}</span>
          </div>
        </div>
      </div>` : '';

    const lastStep = taxLimit !== null ? 6 : 5;

    // ── 계산 과정 전체
    const processHtml = `
      <button class="process-toggle" onclick="toggleProcess(this)">
        📋 계산 과정 상세 보기&nbsp;<span class="arrow">▼</span>
      </button>
      <div class="process-body">
        <div class="process-inner">

          <div class="step">
            <div class="step-title blue">STEP 1 · 과세표준 산정</div>
            <div class="step-content">
              종합부동산세는 시가가 아닌 <strong>주택공시가격</strong> 기준으로 계산합니다.
              공제금액을 차감한 뒤 공정시장가액비율 60%를 곱해 과세표준을 구합니다.
              <div class="formula">
                주택공시가격 합계<br>
                <span class="sub">${priceList}</span><br>
                = <span class="hi">${fmt(total)}</span><br><br>
                − 공제금액 <span class="hi">${fmt(DEDUCTION)}</span>
                <span class="sub">(${isOne ? '1세대 1주택자' : '일반·다주택자'})</span><br>
                = 공제초과금액 <span class="hi">${fmt(excessAmount)}</span><br><br>
                × 공정시장가액비율 <span class="hi">60%</span><br>
                = 과세표준 <span class="ans">${fmt(taxBase)}</span>
              </div>
            </div>
          </div>

          <div class="step">
            <div class="step-title green">STEP 2 · 종합부동산세액 산정</div>
            <div class="step-content">
              ${isHeavy
                ? `3주택 이상이고 과세표준 12억원 초과 → <strong style="color:#ff9090;">중과세율</strong> 적용`
                : count >= 3
                  ? `3주택 이상이지만 과세표준 12억원 이하 → <strong style="color:#4ee8a8;">기본세율</strong> 적용`
                  : `2주택 이하 소유자 → <strong style="color:#4ee8a8;">기본세율</strong> 적용`
              }
              <div class="formula">
                과세표준 <span class="hi">${fmt(taxBase)}</span><br>
                × 세율 <span class="hi">${pct(rate)}</span> ${badgeHtml}<br>
                − 누진공제액 <span class="hi">${fmt(progDed)}</span><br>
                = 종합부동산세액 <span class="ans">${fmt(crtTax)}</span>
              </div>
            </div>
          </div>

          <div class="step">
            <div class="step-title orange">STEP 3 · 공제할 재산세액 계산</div>
            <div class="step-content">
              동일 주택에 재산세와 종합부동산세가 이중 과세되는 것을 방지하기 위해,
              종합부동산세 과세표준에 해당하는 재산세 상당액을 공제합니다.
              <br><br>
              <strong>① 주택별 재산세 부과세액</strong>
              <table class="sub-table">
                <thead>
                  <tr>
                    <th>구분</th><th>공시가격</th><th>과세표준(×60%)</th><th>세율</th>
                    <th style="text-align:right;">재산세액</th>
                  </tr>
                </thead>
                <tbody>
                  ${propRows}
                  <tr>
                    <td class="td-sum" colspan="4">합계</td>
                    <td class="td-right td-sum">${fmt(propTaxTotal)}</td>
                  </tr>
                </tbody>
              </table>
              <div class="formula">
                <strong>② 공제할 재산세액</strong><br>
                <span class="sub">= 재산세 부과세액 합계 × (종부세 과세표준 × 60% × 세율) ÷ 전체 주택 재산세 합계</span><br><br>
                = <span class="hi">${fmt(propTaxTotal)}</span>
                  × (<span class="hi">${fmt(taxBase)}</span> × 60% × <span class="hi">${pct(rate)}</span>)<br>
                &nbsp;&nbsp;÷ <span class="hi">${fmt(propTaxTotal)}</span><br>
                = <span class="ans">${fmt(deductiblePropTax)}</span>
              </div>
            </div>
          </div>

          <div class="step">
            <div class="step-title purple">STEP 4 · 산출세액 산정</div>
            <div class="step-content">
              종합부동산세액에서 공제할 재산세액을 차감하여 산출세액을 구합니다.
              <div class="formula">
                종합부동산세액 <span class="hi">${fmt(crtTax)}</span><br>
                − 공제할 재산세액 <span class="hi">${fmt(deductiblePropTax)}</span><br>
                = 산출세액 <span class="ans">${fmt(computedTax)}</span>
              </div>
            </div>
          </div>

          ${stepLimit}

          <div class="step">
            <div class="step-title red">STEP ${lastStep} · 농어촌특별세</div>
            <div class="step-content">
              종합부동산세 납부세액이 발생하면 납부세액의 20%를 농어촌특별세로 함께 납부해야 합니다.
              <div class="formula">
                납부세액 <span class="hi">${fmt(finalTax)}</span> × 20%
                = 농어촌특별세 <span class="ans">${fmt(ruralTax)}</span><br><br>
                총 부담세액 = <span class="hi">${fmt(finalTax)}</span> + <span class="hi">${fmt(ruralTax)}</span>
                = <span class="ans">${fmt(totalBurden)}</span>
              </div>
            </div>
          </div>

        </div>
      </div>
    `;

    area.innerHTML = `
      <div class="result-card">
        <div class="result-header">계산 결과</div>
        <div class="result-rows">
          <div class="result-row">
            <span class="result-label">주택공시가격 합계</span>
            <span class="result-value">${fmt(total)}</span>
          </div>
          <div class="result-row">
            <span class="result-label">공제금액</span>
            <span class="result-value">− ${fmt(DEDUCTION)}</span>
          </div>
          <div class="result-row">
            <span class="result-label">공제초과금액</span>
            <span class="result-value">${fmt(excessAmount)}</span>
          </div>
          <div class="result-row">
            <span class="result-label">과세표준 (×60%)</span>
            <span class="result-value">${fmt(taxBase)}</span>
          </div>
          <div class="result-divider"></div>
          <div class="result-row">
            <span class="result-label">적용 세율 ${badgeHtml}</span>
            <span class="result-value">${pct(rate)}</span>
          </div>
          <div class="result-row">
            <span class="result-label">종합부동산세액 (누진공제 후)</span>
            <span class="result-value">${fmt(crtTax)}</span>
          </div>
          <div class="result-row">
            <span class="result-label">공제할 재산세액</span>
            <span class="result-value">− ${fmt(deductiblePropTax)}</span>
          </div>
          <div class="result-divider"></div>
          <div class="result-row">
            <span class="result-label">산출세액</span>
            <span class="result-value">${fmt(computedTax)}</span>
          </div>
          ${limitRow}
          <div class="result-row">
            <span class="result-label">종합부동산세 납부세액</span>
            <span class="result-value">${fmt(finalTax)}</span>
          </div>
          <div class="result-row">
            <span class="result-label">농어촌특별세 (×20%)</span>
            <span class="result-value">${fmt(ruralTax)}</span>
          </div>
        </div>
        <div class="total-row">
          <span class="total-label">총 부담세액</span>
          <span class="total-value">${fmt(totalBurden)}</span>
        </div>
        ${processHtml}
      </div>`;
  }

  // ── 인쇄 ─────────────────────────────────────────────────
  function printResult() {
    const area = document.getElementById('result-area');
    if (!area.innerHTML.trim()) {
      alert('먼저 계산하기 버튼을 눌러 결과를 생성해 주세요.');
      return;
    }
    // 계산 과정 패널을 열어서 인쇄에 포함
    const body = document.querySelector('.process-body');
    if (body) body.classList.add('open');

    // 인쇄 푸터에 날짜 삽입
    const now = new Date();
    const dateStr = `${now.getFullYear()}년 ${now.getMonth()+1}월 ${now.getDate()}일 ${now.getHours()}시 ${now.getMinutes()}분 계산`;
    document.getElementById('print-footer').textContent = `종합부동산세 계산기 · ${dateStr} · 본 자료는 참고용이며 실제 세액과 다를 수 있습니다.`;

    window.print();
  }

  // ── 저장 (HTML 파일로 다운로드) ──────────────────────────
  function saveResult() {
    const area = document.getElementById('result-area');
    if (!area.innerHTML.trim()) {
      alert('먼저 계산하기 버튼을 눌러 결과를 생성해 주세요.');
      return;
    }
    const now = new Date();
    const dateStr = `${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}`;

    // 현재 페이지 전체 HTML을 그대로 저장
    const html = document.documentElement.outerHTML;
    const blob = new Blob([html], { type: 'text/html;charset=utf-8' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href     = url;
    a.download = `종합부동산세_계산결과_${dateStr}.html`;
    a.click();
    URL.revokeObjectURL(url);
  }

  // ── 초기화 ────────────────────────────────────────────────
  function resetAll() {
    if (!confirm('모든 입력값과 결과를 초기화할까요?')) return;
    houseType = '1';
    houseId   = 1;
    houses    = [{ id: houseId++ }];
    document.getElementById('btn-one').classList.add('active');
    document.getElementById('btn-multi').classList.remove('active');
    document.getElementById('prev-year-tax').value = '';
    document.getElementById('result-area').innerHTML = '';
    renderHouses();
  }

  renderHouses();
</script>
</body>
</html>
