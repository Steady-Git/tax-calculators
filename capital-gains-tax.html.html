<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>양도소득세 계산기</title>
</head>

<body>

<h2>양도소득세 계산기</h2>

양도가액  
<input type="number" id="sell"><br><br>

취득가액  
<input type="number" id="buy"><br><br>

<button onclick="calc()">계산</button>

<h3 id="result"></h3>

<script>

function calc(){

let sell = Number(document.getElementById("sell").value)
let buy = Number(document.getElementById("buy").value)

let gain = sell-buy

let tax = gain*0.2

document.getElementById("result").innerHTML =
"양도세: "+tax.toLocaleString()+"원"

}

</script>

</body>
</html>
