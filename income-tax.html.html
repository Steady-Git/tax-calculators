<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>종합소득세 계산기</title>
</head>

<body>

<h2>종합소득세 계산기</h2>

소득금액  
<input type="number" id="income">

<br><br>

<button onclick="calc()">계산</button>

<h3 id="result"></h3>

<script>

function calc(){

let income = Number(document.getElementById("income").value)

let tax=0

if(income<=14000000){
tax=income*0.06
}
else if(income<=50000000){
tax=income*0.15
}
else{
tax=income*0.24
}

document.getElementById("result").innerHTML =
"예상 세액: "+tax.toLocaleString()+"원"

}

</script>

</body>
</html>
