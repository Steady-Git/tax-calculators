<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>세무사 상담 자동화 프로그램</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

body{
font-family:Arial;
background:#f2f4f7;
padding:30px;
text-align:center;
}

.container{
background:white;
width:800px;
margin:auto;
padding:30px;
border-radius:10px;
box-shadow:0 0 15px rgba(0,0,0,0.1);
}

h2{
margin-bottom:20px;
}

input{
width:90%;
padding:10px;
margin:8px;
font-size:14px;
}

button{
padding:10px 20px;
margin:5px;
border:none;
background:#2c7be5;
color:white;
cursor:pointer;
border-radius:5px;
}

button:hover{
background:#1a5fd1;
}

.result{
margin-top:20px;
font-size:16px;
text-align:left;
line-height:1.6;
background:#f8f9fb;
padding:15px;
border-radius:5px;
}

</style>
</head>

<body>

<div class="container">

<h2>세무사 상담 자동화 프로그램</h2>

<h3>고객 정보</h3>

<input id="name" placeholder="고객 이름">

<input id="code" placeholder="업종코드 (예: 47110)">

<input id="revenue" type="number" placeholder="연 매출">

<button onclick="analyze()">사업자 분석</button>

<button onclick="saveCustomer()">고객 저장</button>

<button onclick="loadCustomers()">고객 조회</button>

<div id="customerList"></div>

<hr>

<h3>사업자 분석 결과</h3>

<div class="result" id="analysisResult"></div>

<hr>

<h3>종합소득세 계산</h3>

<input id="income" type="number" placeholder="과세표준">

<button onclick="incomeTax()">세액 계산</button>

<div class="result" id="taxResult"></div>

<hr>

<h3>부가세 계산</h3>

<input id="sales" type="number" placeholder="매출">

<input id="purchase" type="number" placeholder="매입">

<button onclick="vat()">부가세 계산</button>

<div class="result" id="vatResult"></div>

<br>

<button onclick="makePDF()">상담 리포트 PDF 출력</button>

</div>

<script>

let reportText=""
let customers=[]

const expenseRateDB={

"47110":{industry:"소매업",simple:0.909,standard:0.168},
"56111":{industry:"일반음식점",simple:0.876,standard:0.210},
"62010":{industry:"컴퓨터 프로그래밍",simple:0.780,standard:0.260},
"70200":{industry:"경영컨설팅",simple:0.760,standard:0.270},
"74210":{industry:"디자인업",simple:0.800,standard:0.250}

}

function analyze(){

let name=document.getElementById("name").value
let code=document.getElementById("code").value
let revenue=parseInt(document.getElementById("revenue").value)

let data=expenseRateDB[code]

if(!data){
document.getElementById("analysisResult").innerHTML="업종코드 DB 없음"
return
}

let industry=data.industry
let simple=data.simple
let standard=data.standard

let bookLimit=150000000
let sincerityLimit=750000000

let bookkeeping=revenue>=bookLimit?"복식부기 대상":"간편장부 대상"
let sincerity=revenue>=sincerityLimit?"성실신고 대상":"성실신고 대상 아님"

let text=

"고객 : "+name+"<br><br>"+
"업종 : "+industry+"<br><br>"+
"단순경비율 : "+(simple*100)+"%<br><br>"+
"기준경비율 : "+(standard*100)+"%<br><br>"+
"기장의무 : "+bookkeeping+"<br><br>"+
"성실신고 여부 : "+sincerity

document.getElementById("analysisResult").innerHTML=text

reportText=text.replace(/<br>/g,"\n")

}

function incomeTax(){

let income=parseInt(document.getElementById("income").value)

let tax=0

if(income<=12000000) tax=income*0.06
else if(income<=46000000) tax=income*0.15-1080000
else if(income<=88000000) tax=income*0.24-5220000
else if(income<=150000000) tax=income*0.35-14900000
else tax=income*0.38-19400000

document.getElementById("taxResult").innerHTML=
"예상 종합소득세 : "+Math.floor(tax).toLocaleString()+" 원"

reportText += "\n\n예상 종합소득세 : "+Math.floor(tax).toLocaleString()+" 원"

}

function vat(){

let sales=parseInt(document.getElementById("sales").value)
let purchase=parseInt(document.getElementById("purchase").value)

let vat=(sales*0.1)-(purchase*0.1)

document.getElementById("vatResult").innerHTML=
"납부 부가세 : "+vat.toLocaleString()+" 원"

reportText += "\n납부 부가세 : "+vat.toLocaleString()+" 원"

}

function makePDF(){

const { jsPDF } = window.jspdf

let doc=new jsPDF()

doc.setFontSize(14)

doc.text("세무 상담 리포트",20,20)

let lines=doc.splitTextToSize(reportText,170)

doc.text(lines,20,40)

doc.save("tax_consulting_report.pdf")

}

function saveCustomer(){

let name=document.getElementById("name").value
let code=document.getElementById("code").value
let revenue=document.getElementById("revenue").value

let customer={
name:name,
industryCode:code,
revenue:revenue,
date:new Date().toLocaleDateString()
}

customers.push(customer)

localStorage.setItem("customerDB",JSON.stringify(customers))

alert("고객 저장 완료")

}

function loadCustomers(){

let data=localStorage.getItem("customerDB")

if(data){
customers=JSON.parse(data)
}

let list="<h3>고객 목록</h3>"

customers.forEach(c=>{
list+=c.name+" / "+c.industryCode+" / "+c.revenue+" / "+c.date+"<br>"
})

document.getElementById("customerList").innerHTML=list

}

</script>

</body>
</html>
